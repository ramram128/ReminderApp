workflows:
  react-native-ios:
    name: ReminderApp iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2 # Use faster M2 instances

    environment:
      node: 22 # Updated to match package.json engine requirements
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/ReminderApp.xcworkspace"
        XCODE_SCHEME: "ReminderApp"

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Install CocoaPods
        script: |
          bundle install
          cd ios && bundle exec pod install

      - name: Build iOS Simulator App
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            build

    artifacts:
      - ios/build/**/*.app

    publishing:
      email:
        recipients:
          - jprakashram11@gmail.com