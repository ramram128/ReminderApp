workflows:
  react-native-ios:
    name: ReminderApp iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2 # Use faster M2 instances

    environment:
      node: 22 # Updated to match package.json engine requirements
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/ReminderApp.xcworkspace"
        XCODE_SCHEME: "ReminderApp"

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Install CocoaPods
        script: |
          bundle install
          cd ios && bundle exec pod install

      - name: Build iOS app
        script: |
          # Note: build-ipa requires iOS code signing to be configured in Codemagic.
          # To build without signing for testing, use 'xcode-project build-app' instead.
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - jprakashram11@gmail.com